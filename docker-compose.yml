services:
  postgres:
    image: postgres:16-alpine
    container_name: estaehub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: estatehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_socket:/var/run/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d estatehub"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
  postgres_socket:
     